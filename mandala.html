<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandala Drawer</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background-color: #2b2b2b;
  }

  #canvas-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    position: absolute;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    transform-origin: 0 0;
  }

  #draw-canvas {
    z-index: 4; /* Behind ui-canvas */
  }

  #ui-canvas {
    /* On top so lines are visible and anchors are clickable */
    z-index: 5;
    pointer-events: none;
  }

  #bg-pattern {
    position: absolute;
    transform-origin: 0 0;
    z-index: 3;
    display: none;
  }

  .transparent-pattern {
    background-color: #ffffff;
    background-image: 
      linear-gradient(45deg, #d3d3d3 25%, transparent 25%), 
      linear-gradient(-45deg, #d3d3d3 25%, transparent 25%), 
      linear-gradient(45deg, transparent 75%, #d3d3d3 75%), 
      linear-gradient(-45deg, transparent 75%, #d3d3d3 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  }

  .panel {
    position: fixed;
    background: #ffffff;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    padding: 15px;
    z-index: 10;
  }
  
  #bottom-panel {
    bottom: 0;
    left: 50%;
    width: 90%;
    max-width: 900px;
    transform: translate(-50%, 0);
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    transition: transform 0.3s ease;
    z-index: 20;
    padding-top: 0;
  }

  #bottom-panel.closed {
    /* Hides the panel but leaves the toggle button visible */
    transform: translate(-50%, calc(100% - 35px));
  }

  .toggle-btn {
    text-align: center;
    cursor: pointer;
    font-weight: bold;
    height: 35px;
    line-height: 35px;
    background: #e0e0e0;
    margin: 0 -15px 15px -15px;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    user-select: none;
  }

  .toggle-btn:hover {
    background: #d0d0d0;
  }

  .tool-section {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #eee;
  }

  .tool-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  
  label {
    margin-right: 15px;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  input[type="number"] {
    width: 65px;
  }
  
  .flex-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .section-title {
    font-weight: bold;
    margin-right: 15px;
    min-width: 120px;
  }
</style>
</head>
<body>

<div id="canvas-container">
  <div id="bg-pattern"></div>
  <canvas id="draw-canvas"></canvas>
  <canvas id="ui-canvas"></canvas>
</div>

<!-- Bottom Tools Popup -->
<div id="bottom-panel" class="panel closed">
  <div class="toggle-btn" id="toggle-bottom">▲ Tools (100%) ▲</div>
  
  <div class="flex-row tool-section">
    <div class="section-title">Canvas Settings</div>
    <label>Width: <input type="number" id="c-width" value="600"></label>
    <label>Height: <input type="number" id="c-height" value="600"></label>
    <label><input type="checkbox" id="c-square" checked> Make mandala square</label>
    <label><input type="checkbox" id="c-transparent" checked> Transparent</label>
    <button id="apply-settings">Apply Settings</button>
    <button id="clear-canvas">Clear Canvas</button>
    <button id="export-btn">Export Image</button>
  </div>

  <div class="flex-row tool-section">
    <div class="section-title">Painting Tool</div>
    <label><input type="radio" name="tool" value="brush" checked> Brush</label>
    <label><input type="radio" name="tool" value="fill"> Fill Bucket</label>
  </div>

  <div class="flex-row tool-section" id="brush-settings-section">
    <div class="section-title">Brush Settings</div>
    <label>Brush Size: <button id="brush-dec">&lt;</button> <input type="range" id="brush-size" min="1" max="50" value="5"> <button id="brush-inc">&gt;</button> <span id="brush-val">5</span>px</label>
  </div>

  <div class="flex-row tool-section" id="fill-settings-section" style="display: none;">
    <div class="section-title">Fill Bucket Settings</div>
    <label>Sensitivity: <input type="range" id="fill-sensitivity" min="0" max="100" value="20"> <span id="fill-sensitivity-val">20</span></label>
  </div>

  <div class="flex-row tool-section">
    <div class="section-title">Color Settings</div>
    <label>Paint Color: <input type="color" id="paint-color" value="#000000"></label>
    <label>Background Color: <input type="color" id="bg-color" value="#ffffff"></label>
  </div>

  <div class="flex-row tool-section">
    <div class="section-title">Dividing Tools</div>
    <label>Starting Angle: <input type="number" id="start-angle" value="0" min="0" max="360" step="0.1">°</label>
    <label><input type="checkbox" id="mirror-draw"> Mirror draw</label>
  </div>
  
  <div class="flex-row tool-section">
    <div class="section-title">Dividing Angle</div>
    <label><input type="radio" name="div-angle" value="10"> 10°</label>
    <label><input type="radio" name="div-angle" value="15"> 15°</label>
    <label><input type="radio" name="div-angle" value="20"> 20°</label>
    <label><input type="radio" name="div-angle" value="30" checked> 30°</label>
    <label><input type="radio" name="div-angle" value="40"> 40°</label>
    <label><input type="radio" name="div-angle" value="45"> 45°</label>
    <label><input type="radio" name="div-angle" value="60"> 60°</label>
    <label><input type="radio" name="div-angle" value="90"> 90°</label>
    <label><input type="radio" name="div-angle" value="120"> 120°</label>
    <label>
      <input type="radio" name="div-angle" value="custom"> Custom
      <input type="number" id="custom-div-angle" value="45" min="0.1" max="180" step="0.1" disabled>°
    </label>
  </div>

  <div class="flex-row tool-section">
    <div class="section-title">View Controls</div>
    <button id="zoom-in">Zoom In</button>
    <button id="zoom-out">Zoom Out</button>
    <button id="zoom-reset">Reset View</button>
  </div>
</div>

<script>
  const drawCanvas = document.getElementById('draw-canvas');
  const uiCanvas = document.getElementById('ui-canvas');
  const ctx = drawCanvas.getContext('2d');
  const uiCtx = uiCanvas.getContext('2d');
  
  const widthIn = document.getElementById('c-width');
  const heightIn = document.getElementById('c-height');
  const squareCheck = document.getElementById('c-square');
  const transparentCheck = document.getElementById('c-transparent');
  const applyBtn = document.getElementById('apply-settings');
  const clearBtn = document.getElementById('clear-canvas');
  const exportBtn = document.getElementById('export-btn');
  
  const toggleBottom = document.getElementById('toggle-bottom');
  const bottomPanel = document.getElementById('bottom-panel');
  const toolRadios = document.querySelectorAll('input[name="tool"]');
  const brushSettingsSection = document.getElementById('brush-settings-section');
  const fillSettingsSection = document.getElementById('fill-settings-section');
  const brushSizeIn = document.getElementById('brush-size');
  const brushVal = document.getElementById('brush-val');
  const brushDecBtn = document.getElementById('brush-dec');
  const brushIncBtn = document.getElementById('brush-inc');
  const fillSensitivityIn = document.getElementById('fill-sensitivity');
  const fillSensitivityVal = document.getElementById('fill-sensitivity-val');
  const paintColorIn = document.getElementById('paint-color');
  const bgColorIn = document.getElementById('bg-color');
  
  const startAngleIn = document.getElementById('start-angle');
  const mirrorDrawCheck = document.getElementById('mirror-draw');
  const divAngleRadios = document.querySelectorAll('input[name="div-angle"]');
  const customDivAngleIn = document.getElementById('custom-div-angle');

  const bgPattern = document.getElementById('bg-pattern');
  const zoomInBtn = document.getElementById('zoom-in');
  const zoomOutBtn = document.getElementById('zoom-out');
  const zoomResetBtn = document.getElementById('zoom-reset');

  let isDrawing = false;
  let lastX = 0;
  let lastY = 0;
  
  const ANCHOR_RADIUS = 10;
  let startAnchorPos = { x: 0, y: 0 };
  let endAnchorPos = { x: 0, y: 0 };
  let isDraggingStart = false;
  let isDraggingEnd = false;
  
  // --- Undo/Redo State ---
  let historyStack = [];
  let historyIndex = -1;
  const MAX_HISTORY = 10;

  // --- View Control State ---
  let scale = 1.0;
  const MIN_SCALE = 0.5;
  const MAX_SCALE = 5.0;
  let panX = 0;
  let panY = 0;
  let isPanning = false;
  let isSpaceDown = false;
  let lastPanPos = { x: 0, y: 0 };


  function getStartAngle() { return parseFloat(startAngleIn.value) || 0; }
  
  function getDivAngle() {
    const val = Array.from(divAngleRadios).find(r => r.checked).value;
    if (val === 'custom') return parseFloat(customDivAngleIn.value) || 1; 
    return parseFloat(val);
  }

  function initCanvas() {
    const w = parseInt(widthIn.value) || 600;
    const h = parseInt(heightIn.value) || 600;

    drawCanvas.width = uiCanvas.width = w;
    drawCanvas.height = uiCanvas.height = h;

    ctx.imageSmoothingEnabled = false;
    uiCtx.imageSmoothingEnabled = false;

    scale = 1.0;
    const containerRect = canvasContainer.getBoundingClientRect();
    panX = (containerRect.width - w) / 2;
    panY = (containerRect.height - h) / 2;
    applyTransform();
    drawCanvas.style.cursor = 'default';

    if (transparentCheck.checked) {
        bgPattern.style.display = 'block';
        bgPattern.classList.add('transparent-pattern');
        drawCanvas.style.backgroundColor = 'transparent';
        ctx.clearRect(0, 0, w, h);
    } else {
        bgPattern.style.display = 'none';
        bgPattern.classList.remove('transparent-pattern');
        drawCanvas.style.backgroundColor = bgColorIn.value;
        ctx.fillStyle = bgColorIn.value;
        ctx.fillRect(0, 0, w, h);
    }

    // Reset and save initial state for undo/redo
    historyStack = [ctx.getImageData(0, 0, w, h)];
    historyIndex = 0;

    drawGuides();
  }

  function drawGuides() {
    const w = uiCanvas.width, h = uiCanvas.height;
    const cx = w / 2, cy = h / 2;
    // Radius for lines should extend to the anchors, near the edge of ui-canvas
    const radius = Math.min(cx, cy) - ANCHOR_RADIUS - 5; // Leave some padding
    
    uiCtx.clearRect(0, 0, w, h);
    
    const startDeg = getStartAngle();
    const divDeg = getDivAngle();

    // Math 0 is right, but requirement 0 is up (subtract 90 degrees)
    const startRad = (startDeg - 90) * Math.PI / 180;
    const endRad = startRad + (divDeg * Math.PI / 180);

    // Store anchor positions for hit detection
    startAnchorPos = { x: cx + Math.cos(startRad) * radius, y: cy + Math.sin(startRad) * radius };
    endAnchorPos = { x: cx + Math.cos(endRad) * radius, y: cy + Math.sin(endRad) * radius };

    // Draw Start Line (blue)
    uiCtx.strokeStyle = 'blue';
    uiCtx.lineWidth = 2;
    uiCtx.setLineDash([5, 5]);
    uiCtx.beginPath();
    uiCtx.moveTo(cx, cy);
    uiCtx.lineTo(startAnchorPos.x, startAnchorPos.y);
    uiCtx.stroke();
    
    // Draw End Line (red)
    uiCtx.strokeStyle = 'red';
    uiCtx.beginPath();
    uiCtx.moveTo(cx, cy);
    uiCtx.lineTo(endAnchorPos.x, endAnchorPos.y);
    uiCtx.stroke();
    uiCtx.setLineDash([]);

    // Draw Start Anchor (blue)
    uiCtx.fillStyle = 'blue';
    uiCtx.beginPath();
    uiCtx.arc(startAnchorPos.x, startAnchorPos.y, ANCHOR_RADIUS, 0, 2 * Math.PI);
    uiCtx.fill();

    // Draw End Anchor (red)
    uiCtx.fillStyle = 'red';
    uiCtx.beginPath();
    uiCtx.arc(endAnchorPos.x, endAnchorPos.y, ANCHOR_RADIUS, 0, 2 * Math.PI);
    uiCtx.fill();
  }

  function isInsideWedge(x, y) {
    const cx = drawCanvas.width / 2, cy = drawCanvas.height / 2;
    if (x === cx && y === cy) return true;

    const angleRad = Math.atan2(y - cy, x - cx);
    let angleDeg = (angleRad * 180 / Math.PI) + 90;
    angleDeg = (angleDeg % 360 + 360) % 360; // Normalize 0-360
    
    const startDeg = (getStartAngle() % 360 + 360) % 360;
    const divDeg = getDivAngle();
    if (divDeg >= 360) return true;
    
    const endDeg = startDeg + divDeg;
    if (endDeg <= 360) return angleDeg >= startDeg && angleDeg <= endDeg;
    return angleDeg >= startDeg || angleDeg <= (endDeg % 360);
  }

  function hexToRgba(hex) {
      const r = parseInt(hex.slice(1, 3), 16) || 0;
      const g = parseInt(hex.slice(3, 5), 16) || 0;
      const b = parseInt(hex.slice(5, 7), 16) || 0;
      return [r, g, b, 255];
  }

  function floodFill(imageData, x, y, fillColorHex, sensitivity) {
      const w = imageData.width;
      const h = imageData.height;
      const data = imageData.data;
      const stack = [[x, y]];
      const fillRgba = hexToRgba(fillColorHex);
      
      const startPos = (y * w + x) * 4;
      const startR = data[startPos];
      const startG = data[startPos + 1];
      const startB = data[startPos + 2];
      const startA = data[startPos + 3];

      // Don't fill if the start color is the same as the fill color
      if (startR === fillRgba[0] && startG === fillRgba[1] && startB === fillRgba[2] && startA === fillRgba[3]) {
          return;
      }

      const matchStartColor = (pos) => {
          const rMatch = Math.abs(data[pos] - startR) <= sensitivity;
          const gMatch = Math.abs(data[pos + 1] - startG) <= sensitivity;
          const bMatch = Math.abs(data[pos + 2] - startB) <= sensitivity;
          const aMatch = data[pos + 3] === startA; // Alpha must be an exact match
          return rMatch && gMatch && bMatch && aMatch;
      };

      const setColor = (pos) => {
          data[pos] = fillRgba[0];
          data[pos + 1] = fillRgba[1];
          data[pos + 2] = fillRgba[2];
          data[pos + 3] = fillRgba[3];
      };

      while (stack.length) {
          let [cx, cy] = stack.pop();
          let pos = (cy * w + cx) * 4;

          while (cy >= 0 && matchStartColor(pos)) {
              cy--;
              pos -= w * 4;
          }
          cy++;
          pos += w * 4;

          let reachLeft = false;
          let reachRight = false;

          while (cy < h && matchStartColor(pos)) {
              setColor(pos);

              if (cx > 0) {
                  if (matchStartColor(pos - 4)) {
                      if (!reachLeft) {
                          stack.push([cx - 1, cy]);
                          reachLeft = true;
                      }
                  } else if (reachLeft) {
                      reachLeft = false;
                  }
              }

              if (cx < w - 1) {
                  if (matchStartColor(pos + 4)) {
                      if (!reachRight) {
                          stack.push([cx + 1, cy]);
                          reachRight = true;
                      }
                  } else if (reachRight) {
                      reachRight = false;
                  }
              }

              cy++;
              pos += w * 4;
          }
      }
  }

  function draw(e) {
    if (!isDrawing) return;
    
    const tool = document.querySelector('input[name="tool"]:checked').value;
    if (tool !== 'brush') return;
    
    const pos = getMousePos(drawCanvas, e);
    const x = pos.x;
    const y = pos.y;
    
    if (!isInsideWedge(x, y)) {
       lastX = x; lastY = y;
       return;
    }

    const cx = drawCanvas.width / 2, cy = drawCanvas.height / 2;
    const divDeg = getDivAngle();
    const mirror = mirrorDrawCheck.checked;
    const startRad = (getStartAngle() - 90) * Math.PI / 180;

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = parseInt(brushSizeIn.value);
    ctx.strokeStyle = paintColorIn.value;

    for (let i = 0; i < 360; i += divDeg) {
       const rad = i * Math.PI / 180;
       
       ctx.save();
       ctx.translate(cx, cy);
       ctx.rotate(rad);
       ctx.beginPath();
       ctx.moveTo(lastX - cx, lastY - cy);
       ctx.lineTo(x - cx, y - cy);
       ctx.stroke();
       ctx.restore();
       
       if (mirror) {
           ctx.save();
           ctx.translate(cx, cy);
           ctx.rotate(rad);
           ctx.rotate(startRad);
           ctx.scale(1, -1);
           ctx.rotate(-startRad);
           ctx.beginPath();
           ctx.moveTo(lastX - cx, lastY - cy);
           ctx.lineTo(x - cx, y - cy);
           ctx.stroke();
           ctx.restore();
       }
    }
    lastX = x; lastY = y;
  }

  const initDraw = (e) => {
    const pos = getMousePos(drawCanvas, e);
    const x = pos.x;
    const y = pos.y;
    
    if (!isInsideWedge(x, y)) {
       lastX = x;
       lastY = y;
       return;
    }

    const tool = document.querySelector('input[name="tool"]:checked').value;
    if (tool === 'fill') {
        const divDeg = getDivAngle();
        const cx = drawCanvas.width / 2;
        const cy = drawCanvas.height / 2;
        const sensitivity = parseInt(fillSensitivityIn.value);
        const imageData = ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
        
        const mirror = mirrorDrawCheck.checked;
        const startRad = (getStartAngle() - 90) * Math.PI / 180;
        const cos2A = Math.cos(2 * startRad);
        const sin2A = Math.sin(2 * startRad);
        
        for (let i = 0; i < 360; i += divDeg) {
            const rad = i * Math.PI / 180;
            const dx = x - cx;
            const dy = y - cy;
            const rx = Math.round(cx + dx * Math.cos(rad) - dy * Math.sin(rad));
            const ry = Math.round(cy + dx * Math.sin(rad) + dy * Math.cos(rad));
            
            if (rx >= 0 && rx < drawCanvas.width && ry >= 0 && ry < drawCanvas.height) {
               floodFill(imageData, rx, ry, paintColorIn.value, sensitivity);
            }
            
            if (mirror) {
                const mx0 = dx * cos2A + dy * sin2A;
                const my0 = dx * sin2A - dy * cos2A;
                
                const mx = Math.round(cx + mx0 * Math.cos(rad) - my0 * Math.sin(rad));
                const my = Math.round(cy + mx0 * Math.sin(rad) + my0 * Math.cos(rad));
                
                if (mx >= 0 && mx < drawCanvas.width && my >= 0 && my < drawCanvas.height) {
                   floodFill(imageData, mx, my, paintColorIn.value, sensitivity);
                }
            }
        }
        ctx.putImageData(imageData, 0, 0);
        saveState();
        isDrawing = false;
    } else {
        isDrawing = true;
        lastX = x;
        lastY = y;
        draw(e);
    }
  };

  // --- Anchor Dragging & Unified Event Handling ---

  function getMousePos(canvas, evt) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
          x: (evt.clientX - rect.left) * scaleX,
          y: (evt.clientY - rect.top) * scaleY
      };
  }

  function handleAnchorMouseDown(e) {
      const pos = getMousePos(drawCanvas, e);
      
      // Hit test for start anchor
      const dxStart = pos.x - startAnchorPos.x;
      const dyStart = pos.y - startAnchorPos.y;
      if (dxStart * dxStart + dyStart * dyStart < ANCHOR_RADIUS * ANCHOR_RADIUS) {
          isDraggingStart = true;
          return true;
      }

      // Hit test for end anchor
      const dxEnd = pos.x - endAnchorPos.x;
      const dyEnd = pos.y - endAnchorPos.y;
      if (dxEnd * dxEnd + dyEnd * dyEnd < ANCHOR_RADIUS * ANCHOR_RADIUS) {
          isDraggingEnd = true;
          return true;
      }
      return false;
  }

  function handleAnchorDrag(e) {
      const pos = getMousePos(drawCanvas, e);
      const cx = drawCanvas.width / 2;
      const cy = drawCanvas.height / 2;

      const angleRad = Math.atan2(pos.y - cy, pos.x - cx);
      let angleDeg = (angleRad * 180 / Math.PI) + 90; // 0 is up
      angleDeg = (angleDeg % 360 + 360) % 360; // normalize to 0-360

      if (isDraggingStart) {
          startAngleIn.value = angleDeg.toFixed(1);
          startAngleIn.dispatchEvent(new Event('input'));
      } else if (isDraggingEnd) {
          const startDeg = getStartAngle();
          let divDeg = angleDeg - startDeg;
          if (divDeg <= 0.1) { // must be at least 0.1
              divDeg += 360;
          }
          
          if (divDeg > 180) {
            divDeg = 180;
          }
          
          const customRadio = document.querySelector('input[name="div-angle"][value="custom"]');
          if (!customRadio.checked) {
              customRadio.checked = true;
              customRadio.dispatchEvent(new Event('change'));
          }
          
          customDivAngleIn.value = divDeg.toFixed(1);
          customDivAngleIn.dispatchEvent(new Event('input'));
      }
  }

  // Mouse & Touch Listeners
  drawCanvas.addEventListener('mousedown', (e) => {
    if (isSpaceDown) {
      isPanning = true;
      lastPanPos = { x: e.clientX, y: e.clientY };
      drawCanvas.style.cursor = 'grabbing';
      return;
    }
    if (!handleAnchorMouseDown(e)) {
      initDraw(e);
    }
  });
  const getTouchObj = (e) => e.touches[0] ? { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY } : null;
  drawCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = getTouchObj(e); if(touch && !handleAnchorMouseDown(touch)) initDraw(touch); }, { passive: false });

  // Global move/end listeners
  const handlePan = (e) => {
    if (!isPanning) return;
    const dx = e.clientX - lastPanPos.x;
    const dy = e.clientY - lastPanPos.y;
    panX += dx;
    panY += dy;
    lastPanPos = { x: e.clientX, y: e.clientY };
    applyTransform();
  };
  const handleMove = (e) => {
    if (isPanning) {
      handlePan(e);
    } else if (isDrawing) {
      draw(e);
    } else if (isDraggingStart || isDraggingEnd) {
      handleAnchorDrag(e);
    }
  };
  const handleTouchMove = (e) => { e.preventDefault(); const touch = getTouchObj(e); if(touch) handleMove(touch); };
  const handleEnd = () => {
    if (isPanning) {
      isPanning = false;
      drawCanvas.style.cursor = isSpaceDown ? 'grab' : 'default';
    }
    if (isDrawing) { // Only save state if we were drawing
        saveState();
    }
    isDrawing = false;
    isDraggingStart = false;
    isDraggingEnd = false;
  };
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('mouseup', handleEnd);
  window.addEventListener('touchmove', handleTouchMove, { passive: false });
  window.addEventListener('touchend', handleEnd);

  // --- Undo/Redo Functions ---
  function saveState() {
    // Truncate future states if we've undone
    historyStack = historyStack.slice(0, historyIndex + 1);

    // Add current state
    historyStack.push(ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));

    // Enforce max history limit
    if (historyStack.length > MAX_HISTORY) {
        historyStack.shift();
    }

    // Update index to point to the latest state
    historyIndex = historyStack.length - 1;
  }

  function undo() {
    if (historyIndex > 0) {
        historyIndex--;
        ctx.putImageData(historyStack[historyIndex], 0, 0);
    }
  }

  function redo() {
    if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        ctx.putImageData(historyStack[historyIndex], 0, 0);
    }
  }

  function updateToggleText() {
    const icon = bottomPanel.classList.contains('closed') ? '▲' : '▼';
    const zoomPct = Math.round(scale * 100);
    toggleBottom.textContent = `${icon} Tools (${zoomPct}%) ${icon}`;
  }

  // --- View Controls (Pan & Zoom) ---

  function applyTransform() {
    const transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    drawCanvas.style.transform = transform;
    uiCanvas.style.transform = transform;
    
    bgPattern.style.transform = `translate(${panX}px, ${panY}px)`;
    bgPattern.style.width = `${drawCanvas.width * scale}px`;
    bgPattern.style.height = `${drawCanvas.height * scale}px`;

    updateToggleText();
  }

  function zoom(scaleAmount, centerX, centerY) {
    const oldScale = scale;
    let newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * scaleAmount));
    
    if (Math.abs(newScale - 1.0) < 0.05) {
        newScale = 1.0;
    }
    scale = newScale;
    const scaleRatio = scale / oldScale;

    panX = centerX - (centerX - panX) * scaleRatio;
    panY = centerY - (centerY - panY) * scaleRatio;

    applyTransform();
  }

  window.addEventListener('keydown', (e) => {
    if (e.ctrlKey) {
        if (e.code === 'KeyZ') {
            e.preventDefault();
            undo();
        } else if (e.code === 'KeyY') {
            e.preventDefault();
            redo();
        }
    }

    if (e.code === 'Space' && !isPanning) {
      e.preventDefault();
      isSpaceDown = true;
      drawCanvas.style.cursor = 'grab';
    }
  });

  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
      isSpaceDown = false;
      if (!isPanning) {
        drawCanvas.style.cursor = 'default';
      }
    }
  });

  // Event Listeners for UI
  squareCheck.addEventListener('change', () => { if(squareCheck.checked) heightIn.value = widthIn.value; });
  widthIn.addEventListener('input', () => { if(squareCheck.checked) heightIn.value = widthIn.value; });
  heightIn.addEventListener('input', () => { if(squareCheck.checked) widthIn.value = heightIn.value; });
  applyBtn.addEventListener('click', initCanvas);
  
  transparentCheck.addEventListener('change', () => {
    bgColorIn.disabled = transparentCheck.checked;
    if (transparentCheck.checked) {
        bgPattern.style.display = 'block';
        bgPattern.classList.add('transparent-pattern');
        drawCanvas.style.backgroundColor = 'transparent';
    } else {
        bgPattern.style.display = 'none';
        bgPattern.classList.remove('transparent-pattern');
        drawCanvas.style.backgroundColor = bgColorIn.value;
    }
  });

  clearBtn.addEventListener('click', () => {
    if (transparentCheck.checked) {
        ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    } else {
        ctx.fillStyle = bgColorIn.value;
        ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
    }
    saveState();
  });
  
  toggleBottom.addEventListener('click', () => {
    bottomPanel.classList.toggle('closed');
    updateToggleText();
  });
  
  toolRadios.forEach(radio => {
    radio.addEventListener('change', (e) => {
        const isBrush = e.target.value === 'brush';
        brushSettingsSection.style.display = isBrush ? 'flex' : 'none';
        fillSettingsSection.style.display = isBrush ? 'none' : 'flex';
    });
  });

  fillSensitivityIn.addEventListener('input', () => fillSensitivityVal.textContent = fillSensitivityIn.value);

  brushSizeIn.addEventListener('input', () => brushVal.textContent = brushSizeIn.value);
  
  brushDecBtn.addEventListener('click', () => {
    brushSizeIn.value = Math.max(1, parseInt(brushSizeIn.value) - 1);
    brushVal.textContent = brushSizeIn.value;
  });
  
  brushIncBtn.addEventListener('click', () => {
    brushSizeIn.value = Math.min(50, parseInt(brushSizeIn.value) + 1);
    brushVal.textContent = brushSizeIn.value;
  });

  bgColorIn.addEventListener('input', () => {
    if (!transparentCheck.checked) {
        drawCanvas.style.backgroundColor = bgColorIn.value;
    }
  });
  
  startAngleIn.addEventListener('input', drawGuides);
  divAngleRadios.forEach(r => r.addEventListener('change', (e) => {
    customDivAngleIn.disabled = (e.target.value !== 'custom');
    drawGuides();
  }));
  customDivAngleIn.addEventListener('input', drawGuides);

  const canvasContainer = document.getElementById('canvas-container');

  canvasContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const scaleAmount = e.deltaY < 0 ? 1.1 : 0.9;
    zoom(scaleAmount, e.clientX, e.clientY);
  }, { passive: false });

  zoomInBtn.addEventListener('click', () => {
    zoom(1.2, window.innerWidth / 2, window.innerHeight / 2);
  });

  zoomOutBtn.addEventListener('click', () => {
    zoom(1 / 1.2, window.innerWidth / 2, window.innerHeight / 2);
  });

  zoomResetBtn.addEventListener('click', () => {
    scale = 1.0;
    const containerRect = canvasContainer.getBoundingClientRect();
    const w = drawCanvas.width;
    const h = drawCanvas.height;
    panX = (containerRect.width - w) / 2;
    panY = (containerRect.height - h) / 2;
    applyTransform();
  });

  exportBtn.addEventListener('click', () => {
    let exportUrl;
    if (transparentCheck.checked) {
        exportUrl = drawCanvas.toDataURL('image/png');
    } else {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = drawCanvas.width;
        tempCanvas.height = drawCanvas.height;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.fillStyle = bgColorIn.value;
        tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        tempCtx.drawImage(drawCanvas, 0, 0);
        exportUrl = tempCanvas.toDataURL('image/png');
    }
    const link = document.createElement('a');
    link.download = 'mandala.png';
    link.href = exportUrl;
    link.click();
  });

  initCanvas();
</script>
</body>
</html>
